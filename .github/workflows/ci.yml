name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-build-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: amrverse

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: amrverse/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run unit and integration tests
        run: pnpm test

      - name: Build application
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/amrverse
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          NEXTAUTH_SECRET: ci-secret-nextauth
          NEXTAUTH_URL: http://127.0.0.1:3000
          JWT_SECRET: ci-secret-jwt
          JWT_REFRESH_SECRET: ci-secret-refresh
          ADMIN_EMAIL: akef.minato@gmail.com
          BLOB_READ_WRITE_TOKEN: blob_test_token
        run: pnpm run build

      - name: Run E2E tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/amrverse
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          NEXTAUTH_SECRET: ci-secret-nextauth
          NEXTAUTH_URL: http://127.0.0.1:3000
          JWT_SECRET: ci-secret-jwt
          JWT_REFRESH_SECRET: ci-secret-refresh
          ADMIN_EMAIL: akef.minato@gmail.com
          BLOB_READ_WRITE_TOKEN: blob_test_token
        run: pnpm run test:e2e
